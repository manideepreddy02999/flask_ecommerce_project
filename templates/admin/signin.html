{% extends "admin/base.html" %}
{% block title %}SmartCart - Admin Sign In{% endblock %}
{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin/signin.css') }}">
{% endblock %}
{% block content %}
<style>
  .admin-theme {
    --sc-brand-400: #f43f5e;
    --sc-brand-500: #E40046;
    --sc-brand-600: #be123c;
    --sc-brand-rgb: 228, 0, 70;
  }

  .admin-theme .sc-btn--primary {
    background-color: var(--sc-brand-500);
    border-color: var(--sc-brand-500);
    box-shadow: 0 4px 12px rgba(var(--sc-brand-rgb), 0.3);
  }

  .admin-theme .sc-btn--primary:hover {
    background-color: var(--sc-brand-600);
    border-color: var(--sc-brand-600);
    box-shadow: 0 6px 16px rgba(var(--sc-brand-rgb), 0.4);
  }

  .admin-theme .sc-auth__footer a,
  .admin-theme .sc-btn--ghost {
    color: var(--sc-brand-400);
  }

  .admin-theme .auth-title {
    color: #fda4af;
  }
</style>
<div class="auth-container admin-theme">
  <div class="glass-card">
    <h2 class="auth-title">Welcome Back</h2>
    <form method="POST" action="/admin-signin">
      <div class="sc-form-group">
        <label class="sc-form-label">Email</label>
        <input class="sc-form-input" type="email" name="email" required placeholder="admin@example.com" />
      </div>
      <div class="sc-form-group">
        <label class="sc-form-label">Password</label>
        <input class="sc-form-input" type="password" name="password" required placeholder="Enter your password" />
      </div>
      <button type="submit" class="sc-btn--primary">Sign In</button>
      <div class="sc-auth__footer">
        <div style="margin-bottom: 0.5rem;">
          <a href="{{ url_for('admin_forgot_password') }}">Forgot Password?</a>
        </div>
        Don't have an account? <a href="{{ url_for('admin_signup') }}">Create one</a>
      </div>
    </form>

    <div class="sc-divider">or</div>

    <div style="text-align: center;">
      <a href="{{ url_for('user_signin') }}" class="sc-btn sc-btn--ghost" style="width: 100%;">User Login</a>
    </div>
  </div>
</div>
{% endblock %}
