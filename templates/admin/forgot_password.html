{% extends "admin/base.html" %}
{% block title %}SmartCart - Admin Forgot Password{% endblock %}
{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin/forgot_password.css') }}">
{% endblock %}
{% block content %}
<style>
  .admin-theme {
    --sc-brand-400: #a78bfa;
    --sc-brand-500: #8b5cf6;
    --sc-brand-600: #7c3aed;
    --sc-brand-rgb: 139, 92, 246;
  }

  .admin-theme .sc-btn--primary {
    background-color: var(--sc-brand-500);
    border-color: var(--sc-brand-500);
    box-shadow: 0 4px 12px rgba(var(--sc-brand-rgb), 0.3);
  }

  .admin-theme .sc-btn--primary:hover {
    background-color: var(--sc-brand-600);
    border-color: var(--sc-brand-600);
    box-shadow: 0 6px 16px rgba(var(--sc-brand-rgb), 0.4);
  }

  .admin-theme .sc-auth__footer a,
  .admin-theme .sc-btn--ghost {
    color: var(--sc-brand-400);
  }

  .admin-theme .auth-title {
    color: #c4b5fd;
  }
</style>
<div class="auth-container admin-theme">
  <div class="glass-card">
    <h2 class="auth-title">Forgot Password</h2>
    <p class="sc-auth__subtitle">Enter your admin email to receive a password reset OTP</p>

    <form method="POST" action="{{ url_for('admin_forgot_password') }}">
      <div class="form-group">
        <label>Admin Email</label>
        <input type="email" name="email" required placeholder="admin@example.com" />
      </div>
      <button type="submit" class="sc-btn--primary">Send OTP</button>
    </form>

    <div class="sc-auth__footer mt-4">
      Remembered your password? <a href="{{ url_for('admin_signin') }}">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
