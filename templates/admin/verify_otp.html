{% extends "admin/base.html" %} {% block title %}SmartCart - Verify OTP{%
endblock %} {% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin/verify_otp.css') }}">
{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="glass-card">
    <h2 class="auth-title">Verify Your OTP</h2>
    <form method="POST" action="/complete-signup">
      <div class="form-group">
        <label>One-Time Password</label>
        <input type="text" id="otp" name="otp" required placeholder="123456" />
      </div>

      <button type="button" class="btn-primary w-100" onclick="verifyOTP()">
        Verify OTP
      </button>

      <div id="otp-status" class="mt-4 text-center"></div>

      <div id="password-section" style="display: none" class="mt-4">
        <div class="form-group">
          <label>Create Password</label>
          <input type="password" name="password" required placeholder="Must be at least 8 characters" />
        </div>
        <button type="submit" class="btn-primary w-100">
          Complete Registration
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %} {% block scripts %}
<script src="{{ url_for('static', filename='js/verify_otp.js') }}"></script>
{% endblock %}
