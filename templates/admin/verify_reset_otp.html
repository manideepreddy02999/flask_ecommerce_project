{% extends "admin/base.html" %}
{% block title %}SmartCart - Verify Admin Password Reset OTP{% endblock %}
{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin/verify_reset_otp.css') }}">
{% endblock %}
{% block content %}
<style>
  .admin-theme {
    --sc-brand-400: #a78bfa;
    --sc-brand-500: #8b5cf6;
    --sc-brand-600: #7c3aed;
    --sc-brand-rgb: 139, 92, 246;
  }

  .admin-theme .sc-btn--primary {
    background-color: var(--sc-brand-500);
    border-color: var(--sc-brand-500);
    box-shadow: 0 4px 12px rgba(var(--sc-brand-rgb), 0.3);
  }

  .admin-theme .sc-btn--primary:hover {
    background-color: var(--sc-brand-600);
    border-color: var(--sc-brand-600);
    box-shadow: 0 6px 16px rgba(var(--sc-brand-rgb), 0.4);
  }

  .admin-theme .sc-auth__footer a,
  .admin-theme .sc-btn--ghost {
    color: var(--sc-brand-400);
  }

  .admin-theme .auth-title {
    color: #c4b5fd;
  }
</style>
<div class="sc-auth auth-container admin-theme sc-animate-fade-in-up">
  <div class="sc-auth__card glass-card">
    <h2 class="sc-auth__title auth-title">Verify Your OTP</h2>
    <p class="sc-auth__subtitle">We've sent an OTP to your admin email.</p>

    <form method="POST" action="{{ url_for('admin_reset_password') }}">
      <div class="form-group">
        <label>One-Time Password</label>
        <input type="text" id="otp" name="otp" required placeholder="123456" />
      </div>

      <button type="button" class="sc-btn--primary" id="verify-otp-btn" onclick="verifyAdminResetOTP()">
        Verify OTP
      </button>

      <div id="otp-status" class="mt-4 text-center"></div>

      <div id="password-section" style="display: none" class="mt-4">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" name="password" required placeholder="Enter new password" />
        </div>
        <button type="submit" class="sc-btn--primary">
          Reset Password
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  async function verifyAdminResetOTP() {
    const otpInput = document.getElementById('otp').value;
    const statusDiv = document.getElementById('otp-status');

    if (!otpInput) {
      statusDiv.innerHTML = '<span >Please enter the OTP</span>';
      return;
    }

    statusDiv.innerHTML = '<span >Verifying...</span>';

    try {
      const formData = new FormData();
      formData.append('otp', otpInput);

      const response = await fetch('/admin-verify-reset-otp', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();

      if (data.success) {
        statusDiv.innerHTML = '<span >OTP Verified! Please enter your new password.</span>';
        document.getElementById('password-section').style.display = 'block';
        document.getElementById('verify-otp-btn').style.display = 'none';
        document.getElementById('otp').readOnly = true;
      } else {
        statusDiv.innerHTML = '<span >Invalid OTP. Please try again.</span>';
      }
    } catch (error) {
      statusDiv.innerHTML = '<span >An error occurred. Try again.</span>';
    }
  }
</script>
{% endblock %}
