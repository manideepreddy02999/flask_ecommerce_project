{% extends "admin/base.html" %}
{% block title %}SmartCart - Add Product{% endblock %}
{% block content %}
<div class="auth-container" style="max-width: 560px;">
  <div class="glass-card sc-animate-fade-in-up">
    <!-- Header -->
    <div class="sc-u-text-center sc-u-mb-8">
      <div class="sc-avatar sc-avatar--lg sc-u-mx-auto" style="margin-bottom: var(--sc-space-4);">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
          </path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
      </div>
      <h2 class="auth-title" style="margin-bottom: var(--sc-space-2);">Add New Product</h2>
      <p class="sc-u-text-sm" style="color: var(--sc-text-muted);">Fill in the details below to add a product to your
        catalog.</p>
    </div>

    <form method="POST" action="{{ url_for('add_product') }}" enctype="multipart/form-data" id="add-product-form">
      <div class="form-group">
        <label for="product-name">Product Name</label>
        <input type="text" name="name" id="product-name" required placeholder="e.g. Wireless Headphones" />
      </div>

      <div class="form-group">
        <label for="product-description">Description</label>
        <textarea name="description" id="product-description" required
          placeholder="Describe the product features, specifications..." rows="4"></textarea>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--sc-space-4);">
        <div class="form-group">
          <label for="product-category">Category</label>
          <input type="text" name="category" id="product-category" required placeholder="e.g. Electronics" />
        </div>
        <div class="form-group">
          <label for="product-price">Price (₹)</label>
          <input type="number" step="0.01" name="price" id="product-price" required placeholder="0.00" />
        </div>
      </div>

      <div class="form-group">
        <label for="product-image">Product Image</label>
        <div class="sc-file-upload" id="file-upload-zone" style="
          border: 2px dashed var(--sc-border-strong);
          border-radius: var(--sc-radius-lg);
          padding: var(--sc-space-8) var(--sc-space-6);
          text-align: center;
          cursor: pointer;
          transition: var(--sc-transition-all);
          background: var(--sc-bg-surface);
        ">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            style="color: var(--sc-text-muted); margin-bottom: var(--sc-space-3); display: block; margin-left: auto; margin-right: auto;">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <p style="color: var(--sc-text-secondary); font-size: var(--sc-text-sm); margin-bottom: var(--sc-space-1);">
            Click to upload or drag & drop
          </p>
          <p style="color: var(--sc-text-muted); font-size: var(--sc-text-xs);" id="file-name-display">
            PNG, JPG, WEBP up to 5MB
          </p>
          <input type="file" name="image" id="product-image" accept="image/*" required style="display: none;" />
        </div>
      </div>

      <!-- Image Preview -->
      <div id="image-preview-container" class="sc-u-hidden"
        style="margin-bottom: var(--sc-space-5); text-align: center;">
        <img id="image-preview" src="" alt="Preview" style="
          max-width: 100%;
          max-height: 200px;
          border-radius: var(--sc-radius-lg);
          border: 1px solid var(--sc-border);
          object-fit: contain;
        " />
      </div>

      <button type="submit" class="sc-btn sc-btn--primary sc-btn--lg w-100" style="margin-top: var(--sc-space-2);">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Add Product
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  (function () {
    const zone = document.getElementById('file-upload-zone');
    const input = document.getElementById('product-image');
    const display = document.getElementById('file-name-display');
    const previewContainer = document.getElementById('image-preview-container');
    const previewImg = document.getElementById('image-preview');

    zone.addEventListener('click', () => input.click());

    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      zone.style.borderColor = 'var(--sc-brand-500)';
      zone.style.background = 'rgba(0, 188, 212, 0.04)';
    });

    zone.addEventListener('dragleave', () => {
      zone.style.borderColor = '';
      zone.style.background = '';
    });

    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.style.borderColor = '';
      zone.style.background = '';
      if (e.dataTransfer.files.length) {
        input.files = e.dataTransfer.files;
        handleFileSelect(e.dataTransfer.files[0]);
      }
    });

    input.addEventListener('change', function () {
      if (this.files[0]) handleFileSelect(this.files[0]);
    });

    function handleFileSelect(file) {
      display.textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
      display.style.color = 'var(--sc-brand-400)';
      zone.style.borderColor = 'var(--sc-success)';

      const reader = new FileReader();
      reader.onload = function (e) {
        previewImg.src = e.target.result;
        previewContainer.classList.remove('sc-u-hidden');
      };
      reader.readAsDataURL(file);
    }
  })();
</script>
{% endblock %}
