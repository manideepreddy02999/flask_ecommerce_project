{% extends "user/base.html" %}
{% block title %}SmartCart - Sign Up{% endblock %}
{% block content %}
<div class="sc-auth auth-container sc-animate-fade-in-up">
  <div class="sc-auth__card glass-card">
    <h2 class="sc-auth__title auth-title">Create Account</h2>
    <p class="sc-auth__subtitle">Join SmartCart and start shopping today</p>

    <form method="POST" action="{{ url_for('user_signup') }}">
      <div class="form-group">
        <label for="signup-name">Full Name</label>
        <input type="text" id="signup-name" name="name" required placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label for="signup-email">Email Address</label>
        <input type="email" id="signup-email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" required placeholder="Create a strong password" />
      </div>
      <button type="submit" class="sc-btn sc-btn--primary sc-btn--block mt-4">Create Account</button>
    </form>

    <div class="sc-divider">or</div>

    <div class="sc-auth__footer">
      Already have an account? <a href="{{ url_for('user_signin') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
