{% extends "user/base.html" %}
{% block title %}SmartCart - Sign In{% endblock %}
{% block content %}
<div class="sc-auth auth-container sc-animate-fade-in-up">
  <div class="sc-auth__card glass-card">
    <h2 class="sc-auth__title auth-title">Welcome Back</h2>
    <p class="sc-auth__subtitle">Sign in to your SmartCart account</p>

    <form method="POST" action="{{ url_for('user_signin') }}">
      <div class="form-group">
        <label for="signin-email">Email</label>
        <input type="email" id="signin-email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="signin-password">Password</label>
        <input type="password" id="signin-password" name="password" required placeholder="Enter your password" />
      </div>
      <button type="submit" class="sc-btn sc-btn--primary sc-btn--block mt-4">Sign In</button>
    </form>

    <div class="sc-divider">or</div>

    <div class="sc-auth__footer">
      Don't have an account? <a href="{{ url_for('user_signup') }}">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
