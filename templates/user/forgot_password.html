{% extends "user/base.html" %}
{% block title %}SmartCart - Forgot Password{% endblock %}
{% block content %}
<div class="sc-auth auth-container sc-animate-fade-in-up">
  <div class="sc-auth__card glass-card">
    <h2 class="sc-auth__title auth-title">Forgot Password</h2>
    <p class="sc-auth__subtitle">Enter your email to receive a password reset OTP</p>

    <form method="POST" action="{{ url_for('user_forgot_password') }}">
      <div class="form-group">
        <label for="reset-email">Registered Email</label>
        <input type="email" id="reset-email" name="email" required placeholder="you@example.com" />
      </div>
      <button type="submit" class="sc-btn sc-btn--primary sc-btn--block mt-4">Send OTP</button>
    </form>

    <div class="sc-auth__footer mt-4">
      Remembered your password? <a href="{{ url_for('user_signin') }}">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
