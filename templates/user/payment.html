{% extends "user/base.html" %}
{% block title %}SmartCart - Payment{% endblock %}
{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/user/payment.css') }}">
{% endblock %}
{% block content %}
<div class="sc-dashboard sc-animate-fade-in-up">
  <div class="glass-card" style="text-align: center; max-width: 500px; width: 100%;">
    <div>
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
        stroke="var(--sc-brand-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect>
        <line x1="2" y1="10" x2="22" y2="10"></line>
      </svg>
    </div>
    <h2>Initializing Payment...</h2>
    <p>Please wait while we connect to Razorpay securely.</p>

    <button id="rzp-button" class="sc-btn--primary" style="display: none;">
      Open Payment Window
    </button>
  </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  var options = {
    "key": "{{ key_id }}",
    "amount": "{{ amount * 100 }}",
    "currency": "INR",
    "name": "SmartCart",
    "description": "Order Payment",
    "order_id": "{{ order_id }}",
    "handler": function (response) {
      var form = document.createElement("form");
      form.method = "POST";
      form.action = "/verify-payment";

      var fields = {
        razorpay_payment_id: response.razorpay_payment_id,
        razorpay_order_id: response.razorpay_order_id,
        razorpay_signature: response.razorpay_signature
      };

      for (var name in fields) {
        var input = document.createElement("input");
        input.type = "hidden";
        input.name = name;
        input.value = fields[name];
        form.appendChild(input);
      }

      document.body.appendChild(form);
      form.submit();
    },
    "modal": {
      "ondismiss": function () {
        document.getElementById('rzp-button').style.display = 'block';
        document.getElementById('rzp-button').innerText = 'Retry Payment';
        document.querySelector('h2').innerText = 'Payment Cancelled';
        document.querySelector('p').innerText = 'You closed the payment window. You can retry or go back to checkout.';
      }
    }
  };

  var rzp = new Razorpay(options);

  window.onload = function () {
    rzp.open();
  };

  document.getElementById('rzp-button').onclick = function (e) {
    rzp.open();
    e.preventDefault();
  }
</script>
{% endblock %}
